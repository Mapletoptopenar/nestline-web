<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>O nás — NestLine</title><link rel="stylesheet" href="css/style.css"></head><body>
<header id="site-header"></header>
<main style="padding-top:72px">
<section style="padding:120px 24px 80px;max-width:1140px;margin:0 auto"><div class="fade-in" style="max-width:640px"><h1 style="font-size:clamp(36px,5.5vw,60px);font-weight:800;line-height:1.08;letter-spacing:-.03em;margin-bottom:8px" data-i18n="about.heroTitle"></h1><h1 style="font-size:clamp(36px,5.5vw,60px);font-weight:800;line-height:1.08;letter-spacing:-.03em;color:var(--gold);margin-bottom:28px" data-i18n="about.heroAccent"></h1><p style="font-size:18px;line-height:1.7;color:var(--g500)" data-i18n="about.heroSub"></p></div></section>
<section class="bg-warm"><div class="section"><div class="fade-in" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:64px;align-items:center"><div><img src="https://nestline.cz/wp-content/uploads/2025/12/iStock-1161036932-min.jpg" alt="NestLine" style="width:100%;border-radius:20px;object-fit:cover;aspect-ratio:4/5"></div><div><p style="font-size:20px;line-height:1.8;color:var(--g800);margin-bottom:40px;font-style:italic">"<span data-i18n="about.story"></span>"</p><div style="display:flex;flex-direction:column;gap:24px"><div style="display:flex;gap:16px;align-items:start"><div style="width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0"></div><div><h4 style="font-size:16px;font-weight:700;margin-bottom:4px" data-i18n="about.v1t"></h4><p style="font-size:14px;color:var(--g500);line-height:1.6" data-i18n="about.v1d"></p></div></div><div style="display:flex;gap:16px;align-items:start"><div style="width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0"></div><div><h4 style="font-size:16px;font-weight:700;margin-bottom:4px" data-i18n="about.v2t"></h4><p style="font-size:14px;color:var(--g500);line-height:1.6" data-i18n="about.v2d"></p></div></div><div style="display:flex;gap:16px;align-items:start"><div style="width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0"></div><div><h4 style="font-size:16px;font-weight:700;margin-bottom:4px" data-i18n="about.v3t"></h4><p style="font-size:14px;color:var(--g500);line-height:1.6" data-i18n="about.v3d"></p></div></div></div></div></div></div></section>
<section id="cta-section" class="bg-gradient"></section>
</main><footer id="site-footer"></footer><script src="js/main.js"></script>
</body></html>
