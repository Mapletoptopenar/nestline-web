<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Služby — NestLine</title><link rel="stylesheet" href="css/style.css"></head><body>
<header id="site-header"></header>
<main style="padding-top:72px">
<section style="padding:120px 24px 40px;max-width:1140px;margin:0 auto"><div class="fade-in" style="max-width:700px"><h1 style="font-size:clamp(36px,5.5vw,60px);font-weight:800;line-height:1.08;letter-spacing:-.03em;margin-bottom:8px" data-i18n="svc.heroTitle"></h1><h1 style="font-size:clamp(36px,5.5vw,60px);font-weight:800;line-height:1.08;letter-spacing:-.03em;color:var(--gold);margin-bottom:28px" data-i18n="svc.heroAccent"></h1><p style="font-size:18px;line-height:1.7;color:var(--g500);max-width:560px" data-i18n="svc.heroSub"></p></div><img src="https://nestline.cz/wp-content/uploads/2025/12/iStock-2175965697-min.jpg" alt="Property" class="fade-in d3 hero-img"></section>
<section class="bg-warm"><div class="section"><div class="fade-in" style="text-align:center;margin-bottom:64px"><span class="badge" data-i18n="svc.auditBadge"></span><h2 style="font-size:clamp(28px,4vw,44px);font-weight:800;margin-bottom:16px" data-i18n="svc.auditTitle"></h2><p style="font-size:16px;color:var(--g500);max-width:560px;margin:0 auto;line-height:1.7" data-i18n="svc.auditSub"></p></div><div class="grid-5" id="audit-grid"></div><div class="fade-in d3" style="text-align:center;margin-top:48px"><div style="display:inline-flex;align-items:center;gap:12px;padding:16px 32px;background:var(--navy);border-radius:12px;color:#fff;font-size:15px;font-weight:600"><span style="color:var(--gold);font-size:28px;font-weight:800">47</span><span data-i18n="svc.totalLabel"></span></div></div></div></section>
<section><div class="section"><div class="fade-in" style="text-align:center;margin-bottom:64px"><span class="badge" data-i18n="svc.outBadge"></span></div>
<div class="fade-in d1 outcome-row" style="display:grid;grid-template-columns:200px 1fr;gap:40px;padding:40px 0;border-bottom:1px solid var(--g200)"><div style="font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.05em" data-i18n="svc.o1p"></div><div><h3 style="font-size:22px;font-weight:700;margin-bottom:12px" data-i18n="svc.o1t"></h3><p style="font-size:15px;line-height:1.7;color:var(--g500)" data-i18n="svc.o1d"></p></div></div>
<div class="fade-in d2 outcome-row" style="display:grid;grid-template-columns:200px 1fr;gap:40px;padding:40px 0;border-bottom:1px solid var(--g200)"><div style="font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.05em" data-i18n="svc.o2p"></div><div><h3 style="font-size:22px;font-weight:700;margin-bottom:12px" data-i18n="svc.o2t"></h3><p style="font-size:15px;line-height:1.7;color:var(--g500)" data-i18n="svc.o2d"></p></div></div>
<div class="fade-in d3 outcome-row" style="display:grid;grid-template-columns:200px 1fr;gap:40px;padding:40px 0"><div style="font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.05em" data-i18n="svc.o3p"></div><div><h3 style="font-size:22px;font-weight:700;margin-bottom:12px" data-i18n="svc.o3t"></h3><p style="font-size:15px;line-height:1.7;color:var(--g500)" data-i18n="svc.o3d"></p></div></div>
</div></section>
<section id="cta-section" class="bg-gradient"></section>
</main><footer id="site-footer"></footer>
<script src="js/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded",function(){
  function buildAudit(){var g=document.getElementById("audit-grid");if(!g)return;g.innerHTML="";for(var i=1;i<=5;i++){var nm=T("svc.cat"+i),ct=T("svc.cat"+i+"n"),its=T("svc.cat"+i+"i").split("|"),pl=T("svc.pointsLabel");var h='<div class="card fade-in d'+i+'" style="padding:32px"><div style="font-size:32px;font-weight:800;color:var(--gold)">'+ct+'</div><div style="font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--g400);margin-bottom:20px;text-transform:uppercase">'+pl+'</div><h3 style="font-size:16px;font-weight:700;margin-bottom:16px">'+nm+'</h3>';its.forEach(function(it){h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:var(--g500)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>'+it+'</span></div>';});h+='</div>';g.innerHTML+=h;}initScrollAnimations();}
  var orig=window.toggleLang;window.toggleLang=function(){orig();buildAudit();};setTimeout(buildAudit,50);
});
</script>
</body></html>
