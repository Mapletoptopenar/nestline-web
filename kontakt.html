<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kontakt — NestLine</title><link rel="stylesheet" href="css/style.css"></head><body>
<header id="site-header"></header>
<main style="padding-top:72px">
<section style="padding:120px 24px 80px;max-width:1140px;margin:0 auto"><div class="fade-in" style="max-width:640px"><h1 style="font-size:clamp(36px,5.5vw,60px);font-weight:800;line-height:1.08;letter-spacing:-.03em;margin-bottom:8px" data-i18n="cont.heroTitle"></h1><h1 style="font-size:clamp(36px,5.5vw,60px);font-weight:800;line-height:1.08;letter-spacing:-.03em;color:var(--gold);margin-bottom:28px" data-i18n="cont.heroAccent"></h1><p style="font-size:18px;line-height:1.7;color:var(--g500);margin-bottom:12px" data-i18n="cont.heroSub"></p><div style="display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:rgba(16,185,129,.08);border-radius:100px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span style="font-size:14px;font-weight:600;color:#10B981" data-i18n="cont.speed"></span></div></div></section>
<section style="padding:0 24px 100px;max-width:1140px;margin:0 auto"><div class="fade-in" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:48px"><div style="background:var(--warm);border-radius:20px;border:1px solid var(--g200);padding:48px"><form style="display:flex;flex-direction:column;gap:20px" onsubmit="event.preventDefault()"><div><label class="form-label" data-i18n="cont.name"></label><input class="form-input"></div><div><label class="form-label" data-i18n="cont.email"></label><input type="email" class="form-input"></div><div><label class="form-label" data-i18n="cont.phone"></label><input class="form-input"></div><div><label class="form-label" data-i18n="cont.type"></label><select class="form-input" style="cursor:pointer"><option value="">—</option><option data-i18n="cont.opt1"></option><option data-i18n="cont.opt2"></option><option data-i18n="cont.opt3"></option><option data-i18n="cont.opt4"></option></select></div><div><label class="form-label" data-i18n="cont.message"></label><textarea rows="4" class="form-input" style="resize:vertical"></textarea></div><button type="submit" class="btn-gold" style="width:100%;margin-top:8px" data-i18n="cont.submit"></button></form></div><div style="background:var(--navy);border-radius:20px;padding:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:400px"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><div style="color:var(--g400);font-size:13px;font-weight:600;letter-spacing:.1em;margin:24px 0 8px" data-i18n="cont.or"></div><h3 style="color:#fff;font-size:22px;font-weight:700;margin-bottom:16px" data-i18n="cont.calendly"></h3><div style="width:100%;height:240px;border-radius:12px;border:2px dashed rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:14px">[CALENDLY EMBED]</div></div></div></section>
</main><footer id="site-footer"></footer><script src="js/main.js"></script>
</body></html>
